<body>
    <header>
        <nav>
            <h1>Portfolio Website</h1>
            <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
            <ul>
                <li><a href="index.html">Home</a></li>

                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <div class="contact-container">
                <div class="contact-row">
                    <div class="contact-form-section">
                        <h2>Send me a Message</h2>
                        <p>Have questions about portfolio samples, need design support, or want custom website guidance? We'd love to hear from you!</p>

                        <form class="contact-form">
                            <input type="text" name="name" placeholder="Your Name" required>
                            <input type="email" name="email" placeholder="Email Address" required>
                            <textarea name="message" placeholder="Your Message" rows="6" required></textarea>
                            <button type="submit" class="send-btn">SEND MESSAGE</button>
                        </form>
                    </div>
                    <div class="contact-info-section">
                        <h2>Contact Me</h2>
                        <div class="social-links">
                            <a href="https://www.facebook.com/ryan.cumad.06" class="hero-btn" target="_blank">📘 Facebook</a>
                            <a href="https://www.instagram.com/ryncmd/" class="hero-btn" target="_blank">📷 Instagram</a>
                        </div>

                        <div class="map-wrapper">
                            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d312.84062137334706!2d123.71566455184197!3d10.566695147888886!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33a907533c69dde7%3A0x6bd07e6ab8416003!2sEskina%20Kalderohan!5e0!3m2!1sen!2sph!4v1773202761671!5m2!1sen!2sph" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                        </div>
                    </div>
                </div>

            </div>
        </section>
